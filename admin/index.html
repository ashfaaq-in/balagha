<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Balagha Orders</title>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;600&display=swap');

    :root {
      --bg:        #0d1f15;
      --bg-mid:    #254d3a;
      --surface:   #1a3528;
      --gold:      #c9a96e;
      --gold-l:    #e0c08a;
      --cream:     #f2ede4;
      --muted:     rgba(242,237,228,0.5);
      --border:    rgba(201,169,110,0.18);
      --red:       #d97070;
      --green:     #5aad7e;
      --font-s:    'Jost', sans-serif;
      --font-serif:'Cormorant Garamond', serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--cream); font-family: var(--font-s); min-height: 100vh; }

    /* ── Login Screen ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 48px 40px; width: 100%; max-width: 400px; text-align: center;
    }
    .login-card h1 { font-family: var(--font-serif); color: var(--gold); font-size: 2rem; margin-bottom: 8px; }
    .login-card p  { color: var(--muted); margin-bottom: 32px; font-size: 0.9rem; }
    .login-input {
      width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: 10px;
      background: var(--bg-mid); color: var(--cream); font-size: 1rem; font-family: var(--font-s);
      margin-bottom: 16px; outline: none;
    }
    .login-input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%; padding: 14px; background: var(--gold); color: var(--bg); border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s; font-family: var(--font-s);
    }
    .login-btn:hover { background: var(--gold-l); }
    .login-error { color: var(--red); font-size: 0.85rem; margin-top: 12px; display: none; }

    /* ── Main Dashboard ── */
    #dashboard { display: none; }
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    header h1 { font-family: var(--font-serif); color: var(--gold); font-size: 1.6rem; }
    header span { color: var(--muted); font-size: 0.85rem; }
    .logout-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
      font-family: var(--font-s); transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--gold); color: var(--gold); }

    main { padding: 32px; max-width: 1400px; margin: 0 auto; }

    /* Stats Bar */
    .stats-bar {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 24px; text-align: center;
    }
    .stat-value { font-family: var(--font-serif); font-size: 2rem; color: var(--gold); font-weight: 700; }
    .stat-label { color: var(--muted); font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 6px; }

    /* Filters */
    .filters {
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 18px; border: 1px solid var(--border); border-radius: 20px;
      background: transparent; color: var(--muted); font-size: 0.85rem; cursor: pointer;
      font-family: var(--font-s); transition: all 0.2s;
    }
    .filter-btn.active, .filter-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,169,110,0.08); }
    .refresh-btn {
      margin-left: auto; padding: 8px 18px; background: var(--gold); color: var(--bg);
      border: none; border-radius: 20px; font-size: 0.85rem; cursor: pointer;
      font-family: var(--font-s); font-weight: 600; transition: background 0.2s;
    }
    .refresh-btn:hover { background: var(--gold-l); }

    /* Orders Table */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--surface); padding: 14px 16px; text-align: left;
      font-size: 0.78rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; cursor: pointer; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(201,169,110,0.04); }
    td { padding: 14px 16px; font-size: 0.9rem; }

    .badge {
      display: inline-flex; align-items: center; padding: 3px 10px;
      border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    }
    .badge-paid    { background: rgba(90,173,126,0.15); color: var(--green); }
    .badge-pending { background: rgba(201,169,110,0.15); color: var(--gold); }
    .badge-failed  { background: rgba(217,112,112,0.15); color: var(--red); }
    .badge-shipped { background: rgba(90,130,200,0.15); color: #7aafff; }
    .badge-delivered { background: rgba(90,173,126,0.15); color: var(--green); }
    .badge-processing { background: rgba(201,169,110,0.15); color: var(--gold); }

    /* Order Detail Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000;
      display: none; align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 32px; width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-header h2 { font-family: var(--font-serif); color: var(--gold); font-size: 1.5rem; }
    .modal-close { background: transparent; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; }
    .modal-close:hover { color: var(--cream); }
    .modal-section { margin-bottom: 24px; }
    .modal-section h3 { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .modal-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
    .modal-row span:first-child { color: var(--muted); }

    .modal-actions { display: flex; flex-direction: column; gap: 12px; }
    .action-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .action-label { font-size: 0.85rem; color: var(--muted); min-width: 110px; }
    .action-select, .action-input {
      flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-mid); color: var(--cream); font-size: 0.9rem; font-family: var(--font-s);
    }
    .action-btn {
      padding: 10px 18px; background: var(--gold); color: var(--bg);
      border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
      font-family: var(--font-s); font-size: 0.85rem; white-space: nowrap;
    }
    .action-btn:hover { background: var(--gold-l); }
    .empty-state { text-align: center; padding: 64px 24px; color: var(--muted); }
    .loading { text-align: center; padding: 48px; color: var(--muted); }

    @media (max-width: 768px) {
      main { padding: 16px; }
      .stats-bar { grid-template-columns: 1fr 1fr; }
      header { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <!-- ── LOGIN ── -->
  <div id="login-screen">
    <div class="login-card">
      <h1>Balagha</h1>
      <p>Admin Dashboard — Orders & Fulfilment</p>
      <input type="password" class="login-input" id="admin-pass" placeholder="Enter admin password" autocomplete="current-password">
      <button class="login-btn" id="login-btn">Sign In</button>
      <p class="login-error" id="login-error">Incorrect password. Try again.</p>
    </div>
  </div>

  <!-- ── DASHBOARD ── -->
  <div id="dashboard">
    <header>
      <h1>Balagha Admin</h1>
      <span id="last-refreshed"></span>
      <button class="logout-btn" id="logout-btn">Sign Out</button>
    </header>
    <main>

      <!-- Stats -->
      <div class="stats-bar" id="stats-bar">
        <div class="stat-card"><div class="stat-value" id="st-total">—</div><div class="stat-label">Total Orders</div></div>
        <div class="stat-card"><div class="stat-value" id="st-revenue">—</div><div class="stat-label">Total Revenue</div></div>
        <div class="stat-card"><div class="stat-value" id="st-paid">—</div><div class="stat-label">Paid Online</div></div>
        <div class="stat-card"><div class="stat-value" id="st-cod">—</div><div class="stat-label">COD Pending</div></div>
      </div>

      <!-- Filters -->
      <div class="filters">
        <button class="filter-btn active" data-filter="">All Orders</button>
        <button class="filter-btn" data-filter="paymentStatus=paid">Paid</button>
        <button class="filter-btn" data-filter="paymentStatus=pending">COD / Pending</button>
        <button class="filter-btn" data-filter="fulfillmentStatus=processing">Processing</button>
        <button class="filter-btn" data-filter="fulfillmentStatus=shipped">Shipped</button>
        <button class="filter-btn" data-filter="fulfillmentStatus=delivered">Delivered</button>
        <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Items</th>
              <th>Total</th>
              <th>Payment</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            <tr><td colspan="7" class="loading">Signing in...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- ── ORDER DETAIL MODAL ── -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-order-id">Order #—</h2>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <div id="modal-body"><!-- filled by JS --></div>
    </div>
  </div>

<script>
'use strict';
const API = 'http://localhost:5000/api';
let adminPass = '';
let currentFilter = '';

/* ── Auth ── */
document.getElementById('login-btn').addEventListener('click', attemptLogin);
document.getElementById('admin-pass').addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });

function attemptLogin() {
  const pass = document.getElementById('admin-pass').value.trim();
  if (!pass) return;
  adminPass = pass;
  loadOrders().then(() => {
    document.getElementById('login-screen').style.display   = 'none';
    document.getElementById('dashboard').style.display      = 'block';
    document.getElementById('login-error').style.display    = 'none';
  }).catch(() => {
    document.getElementById('login-error').style.display = 'block';
    adminPass = '';
  });
}

document.getElementById('logout-btn').addEventListener('click', () => {
  adminPass = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display    = 'none';
  document.getElementById('admin-pass').value = '';
});

/* ── Filters ── */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter || '';
    loadOrders();
  });
});
document.getElementById('refresh-btn').addEventListener('click', () => loadOrders());

/* ── Load Orders ── */
async function loadOrders() {
  const url = `${API}/orders${currentFilter ? '?' + currentFilter : ''}`;
  const res  = await fetch(url, { headers: { 'x-admin-password': adminPass } });
  if (!res.ok) throw new Error('Unauthorized');
  const data = await res.json();

  renderStats(data.stats || {});
  renderTable(data.orders || []);
  document.getElementById('last-refreshed').textContent = 'Refreshed: ' + new Date().toLocaleTimeString('en-IN');
}

/* ── Render Stats ── */
function renderStats(s) {
  document.getElementById('st-total').textContent   = s.totalOrders || 0;
  document.getElementById('st-revenue').textContent = s.totalRevenue ? '₹' + s.totalRevenue.toLocaleString('en-IN') : '₹0';
  document.getElementById('st-paid').textContent    = s.paidRevenue  ? '₹' + s.paidRevenue.toLocaleString('en-IN') : '₹0';
  document.getElementById('st-cod').textContent     = s.codPending   ? '₹' + s.codPending.toLocaleString('en-IN') : '₹0';
}

/* ── Render Table ── */
function renderTable(orders) {
  const tbody = document.getElementById('orders-tbody');
  if (!orders.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No orders found.</td></tr>';
    return;
  }
  tbody.innerHTML = orders.map(o => `
    <tr data-id="${o.orderId}">
      <td><strong style="color:var(--gold)">${o.orderId}</strong></td>
      <td>${o.customer.firstName} ${o.customer.lastName}<br><small style="color:var(--muted)">${o.customer.phone}</small></td>
      <td>${o.items.length} item${o.items.length > 1 ? 's' : ''}</td>
      <td><strong>₹${o.totalAmount.toLocaleString('en-IN')}</strong></td>
      <td>
        <span class="badge badge-${o.paymentStatus}">${o.paymentStatus.toUpperCase()}</span>
        <small style="color:var(--muted); display:block; margin-top:3px;">${o.paymentMethod.toUpperCase()}</small>
      </td>
      <td><span class="badge badge-${o.fulfillmentStatus}">${o.fulfillmentStatus.replace(/_/g,' ')}</span></td>
      <td style="color:var(--muted); font-size:0.82rem;">${new Date(o.createdAt).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'})}</td>
    </tr>
  `).join('');

  tbody.querySelectorAll('tr').forEach(row => {
    row.addEventListener('click', () => openModal(row.dataset.id, orders));
  });
}

/* ── Order Modal ── */
function openModal(orderId, orders) {
  const o = orders.find(x => x.orderId === orderId);
  if (!o) return;

  document.getElementById('modal-order-id').textContent = `Order ${o.orderId}`;

  const itemsHtml = o.items.map(i => `
    <div class="modal-row"><span>${i.name} (${i.size}) × ${i.qty}</span><span>₹${(i.price * i.qty).toLocaleString('en-IN')}</span></div>
  `).join('');

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <h3>Customer</h3>
      <div class="modal-row"><span>Name</span><span>${o.customer.firstName} ${o.customer.lastName}</span></div>
      <div class="modal-row"><span>Email</span><span>${o.customer.email}</span></div>
      <div class="modal-row"><span>Phone</span><span>${o.customer.phone}</span></div>
      <div class="modal-row"><span>Address</span><span>${o.customer.address}, ${o.customer.city}, ${o.customer.state} — ${o.customer.pincode}</span></div>
    </div>
    <div class="modal-section">
      <h3>Items</h3>
      ${itemsHtml}
      <div class="modal-row" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);"><span>Shipping</span><span>₹${o.shippingCharge || 0}</span></div>
      ${o.codFee ? `<div class="modal-row"><span>COD Fee</span><span>₹${o.codFee}</span></div>` : ''}
      <div class="modal-row" style="font-weight:600;color:var(--cream)"><span>Total</span><span>₹${o.totalAmount.toLocaleString('en-IN')}</span></div>
    </div>
    <div class="modal-section">
      <h3>Payment</h3>
      <div class="modal-row"><span>Method</span><span>${o.paymentMethod.toUpperCase()}</span></div>
      <div class="modal-row"><span>Status</span><span class="badge badge-${o.paymentStatus}">${o.paymentStatus.toUpperCase()}</span></div>
      ${o.razorpayPaymentId ? `<div class="modal-row"><span>Razorpay ID</span><span style="font-size:0.8rem">${o.razorpayPaymentId}</span></div>` : ''}
    </div>

    <div class="modal-section">
      <h3>Update Order</h3>
      <div class="modal-actions">
        <!-- Fulfillment Status -->
        <div class="action-group">
          <span class="action-label">Fulfillment</span>
          <select class="action-select" id="upd-fulfill">
            ${['processing','packed','shipped','out_for_delivery','delivered','cancelled'].map(s =>
              `<option value="${s}" ${o.fulfillmentStatus===s?'selected':''}>${s.replace(/_/g,' ')}</option>`
            ).join('')}
          </select>
          <button class="action-btn" id="upd-fulfill-btn">Update</button>
        </div>
        <!-- Payment Status (for COD) -->
        ${o.paymentMethod === 'cod' ? `
        <div class="action-group">
          <span class="action-label">Payment</span>
          <select class="action-select" id="upd-payment">
            <option value="pending" ${o.paymentStatus==='pending'?'selected':''}>Pending</option>
            <option value="paid"    ${o.paymentStatus==='paid'?'selected':''}>Paid (COD received)</option>
          </select>
          <button class="action-btn" id="upd-payment-btn">Update</button>
        </div>` : ''}
        <!-- Tracking -->
        <div class="action-group">
          <span class="action-label">Courier</span>
          <input type="text" class="action-input" id="upd-courier" placeholder="e.g. Delhivery" value="${o.courierName||''}">
        </div>
        <div class="action-group">
          <span class="action-label">Tracking ID</span>
          <input type="text" class="action-input" id="upd-tracking" placeholder="Tracking number" value="${o.trackingId||''}">
        </div>
        <div class="action-group">
          <span class="action-label">Tracking URL</span>
          <input type="text" class="action-input" id="upd-trackurl" placeholder="https://..." value="${o.trackingUrl||''}">
        </div>
        <div class="action-group">
          <button class="action-btn" id="upd-tracking-btn" style="width:100%;">Save Tracking & Notify Customer ✉️</button>
        </div>
      </div>
    </div>
  `;

  // Event: fulfillment update
  document.getElementById('upd-fulfill-btn').addEventListener('click', async () => {
    const status = document.getElementById('upd-fulfill').value;
    await patchOrder(o.orderId, { fulfillmentStatus: status });
    loadOrders();
    closeModal();
  });

  // Event: payment update (COD)
  if (o.paymentMethod === 'cod') {
    document.getElementById('upd-payment-btn').addEventListener('click', async () => {
      const status = document.getElementById('upd-payment').value;
      await patchOrder(o.orderId, { paymentStatus: status });
      loadOrders();
      closeModal();
    });
  }

  // Event: tracking save
  document.getElementById('upd-tracking-btn').addEventListener('click', async () => {
    const update = {
      courierName:  document.getElementById('upd-courier').value.trim(),
      trackingId:   document.getElementById('upd-tracking').value.trim(),
      trackingUrl:  document.getElementById('upd-trackurl').value.trim(),
      fulfillmentStatus: 'shipped',
    };
    await patchOrder(o.orderId, update);
    loadOrders();
    closeModal();
  });

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById('modal-overlay')) closeModal(); });

async function patchOrder(orderId, body) {
  const res = await fetch(`${API}/orders/${orderId}`, {
    method:  'PATCH',
    headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPass },
    body:    JSON.stringify(body),
  });
  const data = await res.json();
  if (!data.success) alert('Update failed: ' + data.error);
  return data;
}
</script>
</body>
</html>
